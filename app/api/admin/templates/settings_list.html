{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Runtime Settings</h1>

<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-gray-100">
            <tr>
                <th class="px-4 py-2 text-left">Key</th>
                <th class="px-4 py-2 text-left">Value</th>
                <th class="px-4 py-2 text-left">Description</th>
                <th class="px-4 py-2 text-left">Updated</th>
            </tr>
        </thead>
        <tbody>
            {% for s in settings %}
            <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-2 font-mono text-xs">{{ s.key }}</td>
                <td class="px-4 py-2 font-mono text-xs">{{ s.value }}</td>
                <td class="px-4 py-2">{{ s.description or '' }}</td>
                <td class="px-4 py-2 text-xs text-gray-500">{{ s.updated_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
