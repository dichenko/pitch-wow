{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold">{{ prompt.key }}</h1>
        <p class="text-gray-500 text-sm">Version {{ prompt.version }} — {{ prompt.title }}</p>
    </div>
    <a href="/admin/prompts" class="text-indigo-600 hover:underline text-sm">&larr; Back to list</a>
</div>

<div class="bg-white rounded-lg shadow p-6 mb-6">
    <h2 class="font-semibold mb-3">Prompt Content</h2>
    <pre class="bg-gray-50 p-4 rounded text-sm whitespace-pre-wrap">{{ prompt.content }}</pre>
</div>

<div class="bg-white rounded-lg shadow p-6">
    <h2 class="font-semibold mb-3">Create New Version</h2>
    <form method="post" action="/admin/prompts/{{ prompt.key }}/versions">
        <input type="text" name="title" placeholder="New version title" required
            class="w-full border rounded px-3 py-2 mb-3">
        <textarea name="content" rows="10" placeholder="New prompt content" required
            class="w-full border rounded px-3 py-2 mb-3 font-mono text-sm">{{ prompt.content }}</textarea>
        <button type="submit" class="bg-indigo-600 text-white rounded px-4 py-2 hover:bg-indigo-700">
            Create Version
        </button>
    </form>
</div>
{% endblock %}
