<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Wow Admin — Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-indigo-700 mb-6">Pitch Wow Admin</h1>
        <p class="text-gray-600 mb-4">
            Доступ к админ-панели предоставляется через Telegram-бота.
        </p>
        <div class="bg-indigo-50 border border-indigo-200 rounded p-4 mb-4 text-left">
            <ol class="list-decimal list-inside text-sm text-gray-700 space-y-2">
                <li>Откройте бота Pitch Wow в Telegram</li>
                <li>Отправьте команду <code class="bg-gray-100 px-1 rounded">/admin</code></li>
                <li>Бот пришлёт временную ссылку для входа</li>
                <li>Перейдите по ссылке — вы попадёте в админ-панель</li>
            </ol>
        </div>
        <p class="text-gray-400 text-xs">Ссылка действительна ограниченное время.</p>
    </div>
</body>
</html>
